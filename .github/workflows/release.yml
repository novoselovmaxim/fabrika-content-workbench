name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: cd app && npm run build
      - run: cd server && npm run build
      - run: npm install -g @yao-pkg/pkg
      - run: cd server && npm run pkg:macos-arm
      - name: Package
        run: |
          VERSION=$(cat version.txt)
          mkdir -p releases release/macos-arm64/FabrikaContent
          cp dist-bin/fabrika-server-macos-arm release/macos-arm64/FabrikaContent/fabrika-server-macos
          cp -r app/dist release/macos-arm64/FabrikaContent/app
          cp -r migrations release/macos-arm64/FabrikaContent/
          cp version.txt release/macos-arm64/FabrikaContent/
          cp installers/macos/start.command release/macos-arm64/FabrikaContent/
          cp installers/macos/uninstall.command release/macos-arm64/FabrikaContent/
          chmod +x release/macos-arm64/FabrikaContent/start.command
          chmod +x release/macos-arm64/FabrikaContent/fabrika-server-macos
          cd release/macos-arm64 && zip -r ../../releases/FabrikaContent-${VERSION}-macos-arm64.zip FabrikaContent
      - uses: actions/upload-artifact@v4
        with:
          name: zip-macos-arm64
          path: releases/FabrikaContent-*.zip

  build-macos-x64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: cd app && npm run build
      - run: cd server && npm run build
      - run: npm install -g @yao-pkg/pkg
      - run: cd server && npm run pkg:macos
      - name: Package
        run: |
          VERSION=$(cat version.txt)
          mkdir -p releases release/macos-x64/FabrikaContent
          cp dist-bin/fabrika-server-macos release/macos-x64/FabrikaContent/fabrika-server-macos
          cp -r app/dist release/macos-x64/FabrikaContent/app
          cp -r migrations release/macos-x64/FabrikaContent/
          cp version.txt release/macos-x64/FabrikaContent/
          cp installers/macos/start.command release/macos-x64/FabrikaContent/
          cp installers/macos/uninstall.command release/macos-x64/FabrikaContent/
          chmod +x release/macos-x64/FabrikaContent/start.command
          chmod +x release/macos-x64/FabrikaContent/fabrika-server-macos
          cd release/macos-x64 && zip -r ../../releases/FabrikaContent-${VERSION}-macos-x64.zip FabrikaContent
      - uses: actions/upload-artifact@v4
        with:
          name: zip-macos-x64
          path: releases/FabrikaContent-*.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Update node-gyp for VS 2025
        run: npm install -g node-gyp@latest
      - run: npm install
      - run: cd app && npm run build
      - run: cd server && npm run build
      - run: npm install -g @yao-pkg/pkg
      - run: cd server && npm run pkg:win
      - name: Package
        shell: bash
        run: |
          VERSION=$(cat version.txt)
          mkdir -p releases release/win/FabrikaContent
          cp dist-bin/fabrika-server-win.exe release/win/FabrikaContent/
          cp -r app/dist release/win/FabrikaContent/app
          cp -r migrations release/win/FabrikaContent/
          cp version.txt release/win/FabrikaContent/
          cp installers/windows/start.bat release/win/FabrikaContent/
          cp installers/windows/install-shortcut.ps1 release/win/FabrikaContent/
          cd release/win && zip -r ../../releases/FabrikaContent-${VERSION}-windows.zip FabrikaContent
      - uses: actions/upload-artifact@v4
        with:
          name: zip-windows
          path: releases/FabrikaContent-*.zip

  create-release:
    needs: [build-macos-arm64, build-macos-x64, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Collect zips
        run: |
          mkdir -p releases
          find . -name '*.zip' -exec cp {} releases/ \;
          ls -la releases/
      - uses: softprops/action-gh-release@v1
        with:
          files: releases/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
