name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm install -g @yao-pkg/pkg
      - run: cd server && npm run build
      - run: cd app && npm run build
      - run: npx tsc -p electron/tsconfig.json
      - name: Build Electron app
        run: npx electron-builder --mac --arm64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-macos-arm64
          path: release/electron/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: cd server && npm run build
      - run: cd app && npm run build
      - run: npx tsc -p electron/tsconfig.json
      - name: Rebuild native addon for Electron
        run: npx electron-rebuild -f -w better-sqlite3
      - name: Build Electron app
        run: npx electron-builder --win --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-windows
          path: release\electron\*.exe

  create-release:
    needs: [build-macos-arm64, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Collect all artifacts
        run: |
          mkdir -p releases
          find . -type f \( -name '*.dmg' -o -name '*.exe' \) -exec cp {} releases/ \;
          ls -la releases/
      - uses: softprops/action-gh-release@v1
        with:
          files: releases/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
