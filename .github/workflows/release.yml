name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm install -g @yao-pkg/pkg
      - run: cd server && npm run build
      - run: cd app && npm run build
      - run: npx tsc -p electron/tsconfig.json
      - name: Build Electron app
        run: npx electron-builder --mac --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-macos-arm64
          path: release/electron/*.dmg

  build-macos-x64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: cd server && npm run build
      - run: cd app && npm run build
      - run: npx tsc -p electron/tsconfig.json
      - name: Build Electron app
        run: npx electron-builder --mac --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-macos-x64
          path: release/electron/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: cd app && npm run build
      - name: Rebuild better-sqlite3 native addon
        run: npm rebuild better-sqlite3
        env:
          GYP_MSVS_VERSION: "2022"
      - name: Verify better-sqlite3 .node file exists
        shell: pwsh
        run: |
          if (-not (Test-Path "node_modules/better-sqlite3/build/Release/better_sqlite3.node")) {
            Write-Host "::warning::better-sqlite3 .node file not found, attempting prebuild-install..."
            npx prebuild-install --runtime node --target 22.23.0 --platform win32 --arch x64 -d node_modules/better-sqlite3
          } else {
            Write-Host "Native addon found"
          }
      - run: cd server && npm run build
      - run: npx tsc -p electron/tsconfig.json
      - name: Build Electron app
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-windows
          path: release\electron\*.exe

  create-release:
    needs: [build-macos-arm64, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Collect all artifacts
        run: |
          mkdir -p releases
          find . -type f \( -name '*.dmg' -o -name '*.exe' \) -exec cp {} releases/ \;
          ls -la releases/
      - uses: softprops/action-gh-release@v1
        with:
          files: releases/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
