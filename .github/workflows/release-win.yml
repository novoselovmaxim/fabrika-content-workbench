name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: cd server && npm run build
      - run: cd app && npm run build
      - run: npx tsc -p electron/tsconfig.json
      - name: Rebuild native addon for Electron
        run: npx electron-rebuild -f -w better-sqlite3
      - name: Build Electron app
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-windows
          path: release\electron\*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: cd server && npm run build
      - run: cd app && npm run build
      - run: npx tsc -p electron/tsconfig.json
      - name: Rebuild native addon for Electron
        run: npx electron-rebuild -f -w better-sqlite3
      - name: Build Electron app (unsigned)
        run: npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-macos
          path: |
            release/electron/*.dmg
            release/electron/*.zip

  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Collect artifacts
        run: |
          mkdir -p releases
          find . -type f \( -name '*.exe' -o -name '*.dmg' \) -exec cp {} releases/ \;
          ls -la releases/
      - uses: softprops/action-gh-release@v1
        with:
          files: releases/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
